services:
  db:
    image: postgis/postgis:16-3.5
    container_name: proximite-db
    platform: linux/amd64
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proximite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proximite}
      POSTGRES_DB: ${POSTGRES_DB:-proximite}
    # synchronous_commit=off acceptable en dev (perf > durabilité)
    command: >
      postgres
      -c shared_buffers=64MB
      -c max_connections=25
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=128MB
      -c synchronous_commit=off
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - proximite-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proximite} -d ${POSTGRES_DB:-proximite}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  adminer:
    image: adminer:latest
    container_name: proximite-adminer
    environment:
      ADMINER_DESIGN: lavender-light
    ports:
      - "5050:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - proximite-net
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.1"

  redis:
    image: redis:7-alpine
    container_name: proximite-redis
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - proximite-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.1"

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: proximite-redis-commander
    environment:
      REDIS_HOSTS: local:redis:6379
    ports:
      - "8081:8081"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - proximite-net
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.1"

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile.dev
    container_name: proximite-api-dev
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: development
      PORT: "3001"
      DATABASE_URL: postgres://${POSTGRES_USER:-proximite}:${POSTGRES_PASSWORD:-proximite}@db:5432/${POSTGRES_DB:-proximite}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
      NODE_OPTIONS: "--max-old-space-size=512"
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
      - shared_pkg_nm:/app/packages/shared/node_modules
      - ui_pkg_nm:/app/packages/ui/node_modules
      - eslint_config_pkg_nm:/app/packages/eslint-config/node_modules
      - typescript_config_pkg_nm:/app/packages/typescript-config/node_modules
      - api_app_nm:/app/apps/api/node_modules
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - proximite-net
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "1.0"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile.dev
    container_name: proximite-web-dev
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      API_URL: "http://api:3001"
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
      NODE_OPTIONS: "--max-old-space-size=512"
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - shared_pkg_nm:/app/packages/shared/node_modules
      - ui_pkg_nm:/app/packages/ui/node_modules
      - eslint_config_pkg_nm:/app/packages/eslint-config/node_modules
      - typescript_config_pkg_nm:/app/packages/typescript-config/node_modules
      - web_app_nm:/app/apps/web/node_modules
    depends_on:
      api:
        condition: service_started
    networks:
      - proximite-net
    deploy:
      resources:
        limits:
          memory: 768m
          cpus: "1.0"

networks:
  proximite-net:
    driver: bridge

volumes:
  db-data:
  redis-data:
  api_node_modules:
  web_node_modules:
  shared_pkg_nm:
  ui_pkg_nm:
  eslint_config_pkg_nm:
  typescript_config_pkg_nm:
  api_app_nm:
  web_app_nm: