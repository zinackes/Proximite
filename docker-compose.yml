services:
  db:
    image: postgis/postgis:16-3.5
    container_name: proximite-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proximite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proximite}
      POSTGRES_DB: ${POSTGRES_DB:-proximite}
    # Tuning pour petits déploiements (défauts PostgreSQL prévus pour gros serveurs)
    command: >
      postgres
      -c shared_buffers=64MB
      -c max_connections=25
      -c work_mem=4MB
      -c maintenance_work_mem=32MB
      -c effective_cache_size=128MB
      -c wal_buffers=4MB
      -c checkpoint_completion_target=0.9
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - proximite-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proximite} -d ${POSTGRES_DB:-proximite}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 64m

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: proximite-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgres://${POSTGRES_USER:-proximite}:${POSTGRES_PASSWORD:-proximite}@db:5432/${POSTGRES_DB:-proximite}
      NODE_OPTIONS: "--max-old-space-size=192"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - proximite-net
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"
        reservations:
          memory: 64m

  adminer:
    image: adminer:latest
    container_name: proximite-adminer
    ports:
      - "5050:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - proximite-net
    deploy:
      resources:
        limits:
          memory: 64m
          cpus: "0.1"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: proximite-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      API_URL: "http://api:3001"
      NODE_OPTIONS: "--max-old-space-size=96"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - proximite-net
    deploy:
      resources:
        limits:
          memory: 128m
          cpus: "0.5"
        reservations:
          memory: 32m

networks:
  proximite-net:
    driver: bridge

volumes:
  db-data:
