services:
  db:
    image: postgis/postgis:16-3.5
    container_name: proximite-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-proximite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-proximite}
      POSTGRES_DB: ${POSTGRES_DB:-proximite}
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - proximite-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-proximite} -d ${POSTGRES_DB:-proximite}"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: proximite-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: production
      PORT: "3001"
      DATABASE_URL: postgres://${POSTGRES_USER:-proximite}:${POSTGRES_PASSWORD:-proximite}@db:5432/${POSTGRES_DB:-proximite}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - proximite-net

  adminer:
    image: adminer:latest
    container_name: proximite-adminer
    ports:
      - "5050:8080"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - proximite-net

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: proximite-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      API_URL: "http://api:3001"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - proximite-net

networks:
  proximite-net:
    driver: bridge

volumes:
  db-data:
